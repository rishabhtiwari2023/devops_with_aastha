apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-backend
  namespace: dummy-app
  labels:
    app: dummy-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dummy-backend
  template:
    metadata:
      labels:
        app: dummy-backend
    spec:
      containers:
      - name: api
        image: python:3.9-alpine
        command: ["python", "-m", "http.server", "8080"]
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "25m"
            memory: "40Mi"
          requests:
            cpu: "5m"
            memory: "20Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dummy-backend-svc
  namespace: dummy-app
spec:
  type: ClusterIP
  selector:
    app: dummy-backend
  ports:
    - port: 8080
      targetPort: 8080
