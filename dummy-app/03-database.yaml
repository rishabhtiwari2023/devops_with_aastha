apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dummy-database
  namespace: dummy-app
spec:
  serviceName: "dummy-db"
  replicas: 1
  selector:
    matchLabels:
      app: dummy-database
  template:
    metadata:
      labels:
        app: dummy-database
    spec:
      containers:
      - name: db-writer
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              echo "Tick $(date)" >> /data/db.txt
              sleep 5
            done
        volumeMounts:
        - name: data-volume
          mountPath: /data
        resources:
          limits:
            cpu: "10m"
            memory: "15Mi"
          requests:
            cpu: "2m"
            memory: "5Mi"
  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Mi
