apiVersion: v1
kind: Namespace
metadata:
  name: rca-dashboard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rca-dashboard-sa
  namespace: rca-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rca-dashboard-role
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "events", "persistentvolumeclaims", "persistentvolumes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rca-dashboard-binding
subjects:
  - kind: ServiceAccount
    name: rca-dashboard-sa
    namespace: rca-dashboard
roleRef:
  kind: ClusterRole
  name: rca-dashboard-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-dashboard
  namespace: rca-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rca-dashboard
  template:
    metadata:
      labels:
        app: rca-dashboard
    spec:
      serviceAccountName: rca-dashboard-sa
      hostNetwork: true # Required to reach Docker sockets on host if DOCKER_HOSTS is used, or to see real host network. Alternatively, mount docker socket.
      containers:
        - name: rca-dashboard
          # You should build the docker image from the k8s-rca-dashboard folder
          # e.g., docker build -t my-rca-dashboard:latest .
          image: my-rca-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # When running in-cluster, you do not need KUBECONFIG, it uses the ServiceAccount.
            - name: LONGHORN_API_URL
              value: "http://longhorn-frontend.longhorn-system.svc.cluster.local:80/v1"
            - name: PROMETHEUS_URL
              value: "http://simple-prometheus.monitoring.svc.cluster.local:9090"
            # Optional: Add DOCKER_HOSTS if you want the dashboard to reach other nodes' Docker APIs
            # - name: DOCKER_HOSTS
            #   value: "tcp://10.42.5.201:2375,tcp://10.42.5.202:2375"
          volumeMounts:
            # If you want to access the local docker socket instead of tcp:
            # - name: docker-sock
            #   mountPath: /var/run/docker.sock
            - name: data-volume
              mountPath: /app/data
      volumes:
        # - name: docker-sock
        #   hostPath:
        #     path: /var/run/docker.sock
        - name: data-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rca-dashboard-svc
  namespace: rca-dashboard
spec:
  type: NodePort
  selector:
    app: rca-dashboard
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30080
